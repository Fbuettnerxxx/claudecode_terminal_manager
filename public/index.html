<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>CCM</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="top-bar">
    <div id="conn-dot" class="dot"></div>
    <div id="tabs-scroll"><div id="tabs"></div></div>
    <button id="new-tab-btn" title="New session">＋</button>
  </div>

  <div id="terminal-wrap">
    <pre id="terminal-out"></pre>
  </div>

  <div id="input-bar">
    <textarea id="term-input" rows="1"
      placeholder="Send input…"
      autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
    ></textarea>
    <button id="send-btn">↑</button>
  </div>

  <!-- New session modal -->
  <div id="modal-overlay" class="hidden" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span>New Session</span>
        <button class="modal-x" onclick="hideModal()">✕</button>
      </div>
      <label class="field-label">Label</label>
      <input id="m-label" class="field-input" placeholder="e.g. auth-refactor" autocomplete="off">
      <label class="field-label">Working directory</label>
      <input id="m-cwd" class="field-input" placeholder="/path/to/project  (created if it doesn't exist)" autocomplete="off">
      <div id="m-error" class="m-error hidden"></div>
      <button id="m-submit" onclick="submitNew()">Start Session →</button>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
