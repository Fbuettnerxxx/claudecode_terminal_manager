<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>CCM</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div id="status-bar">
    <span id="conn-indicator" class="conn-dot disconnected"></span>
    <span id="conn-label">Connecting…</span>
  </div>
  <header>
    <h1>ccm</h1>
    <div id="header-meta"></div>
  </header>
  <div id="stats-row"></div>
  <main id="session-list"></main>

  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">New Session</span>
        <button class="modal-close" onclick="hideNewSessionModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">Label</label>
        <input id="modal-label" class="modal-input" placeholder="e.g. auth refactor" autocomplete="off">
        <label class="modal-label" style="margin-top:14px">Working directory</label>
        <input id="modal-cwd" class="modal-input" placeholder="e.g. /Users/you/newproject (created if needed)" autocomplete="off">
        <div id="modal-error" class="modal-error hidden"></div>
        <button id="modal-submit" class="modal-submit" onclick="submitNewSession()">Start Session →</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
